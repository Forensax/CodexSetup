name: Build Codex Windows Installer

on:
  workflow_dispatch:
    inputs:
      msix_url:
        description: Optional direct OpenAI.Codex x64 Retail MSIX URL. Used when rg-adguard automatic resolution fails.
        required: false
        type: string
      version:
        description: Optional expected Codex version from AppxManifest.xml, for example 26.608.1337.0.
        required: false
        type: string
      draft:
        description: Create the GitHub Release as a draft.
        required: false
        default: true
        type: boolean
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and verify installer
    runs-on: windows-latest
    env:
      MSIX_URL: ${{ inputs.msix_url }}
      EXPECTED_VERSION: ${{ inputs.version }}
      DRAFT_RELEASE: ${{ inputs.draft }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $nsisPath = "${env:ProgramFiles(x86)}\NSIS"
          if (Test-Path -LiteralPath $nsisPath) {
            $nsisPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
          makensis /VERSION

      - name: Resolve and download MSIX
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path source -Force | Out-Null
          $url = $env:MSIX_URL
          if ([string]::IsNullOrWhiteSpace($url)) {
            $url = & ./scripts/resolve-msix-url.ps1 -ProductId '9PLM9XGG6VKS' -PackageFamilyName 'OpenAI.Codex_2p2nqsd0c76g0' -Ring Retail
          }
          if ([string]::IsNullOrWhiteSpace($url)) {
            throw 'No MSIX URL was resolved. Re-run workflow_dispatch with the msix_url input.'
          }
          Write-Host "Downloading MSIX from $url"
          Invoke-WebRequest -Uri $url -OutFile source\Codex.msix -UseBasicParsing -TimeoutSec 600
          Get-FileHash -Algorithm SHA256 -LiteralPath source\Codex.msix | Format-List

      - name: Run packaging tests
        shell: pwsh
        run: |
          ./tests/packaging.tests.ps1

      - name: Build installer
        id: build
        shell: pwsh
        run: |
          $args = @{
            MsixPath = 'source\Codex.msix'
            OutDir = 'dist'
            Unsigned = $true
          }
          if (-not [string]::IsNullOrWhiteSpace($env:EXPECTED_VERSION)) {
            $args.Version = $env:EXPECTED_VERSION
          }
          $result = ./scripts/build-installer.ps1 @args
          "VERSION=$($result.Version)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "INSTALLER_PATH=$($result.InstallerPath)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CHECKSUMS_PATH=$($result.ChecksumsPath)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_NOTES_PATH=$($result.ReleaseNotesPath)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify installer in CI
        shell: pwsh
        run: |
          ./scripts/test-installer-ci.ps1 -InstallerPath "$env:INSTALLER_PATH" -ExpectedVersion "$env:VERSION"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexSetup-x64-${{ env.VERSION }}
          path: |
            ${{ env.INSTALLER_PATH }}
            ${{ env.CHECKSUMS_PATH }}
            ${{ env.RELEASE_NOTES_PATH }}

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ($env:GITHUB_REF_TYPE -eq 'tag') {
            $tag = $env:GITHUB_REF_NAME
          } else {
            $tag = "v$env:VERSION"
          }

          $draft = $true
          if ($env:DRAFT_RELEASE -eq 'false') {
            $draft = $false
          }

          $installerAsset = "$env:INSTALLER_PATH#CodexSetup-x64-$env:VERSION.exe"
          $checksumsAsset = "$env:CHECKSUMS_PATH#checksums.txt"
          $releaseArgs = @(
            'release', 'create', $tag,
            $installerAsset,
            $checksumsAsset,
            '--title', "Codex $env:VERSION",
            '--notes-file', $env:RELEASE_NOTES_PATH,
            '--target', $env:GITHUB_SHA
          )
          if ($draft) {
            $releaseArgs += '--draft'
          }

          gh @releaseArgs
