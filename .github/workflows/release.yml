name: 构建 Codex Windows 安装器

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      msix_url:
        description: 可选的 OpenAI.Codex x64 Retail MSIX 直链；自动解析失败时使用。
        required: false
        type: string
      version:
        description: 可选的期望 Codex 版本，必须与 AppxManifest.xml 一致，例如 26.608.1337.0。
        required: false
        type: string
      draft:
        description: 手动运行时是否创建草稿 Release。
        required: false
        default: true
        type: boolean
  push:
    branches:
      - codex/windows-installer-packaging
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - codex/windows-installer-packaging
      - main
      - master

permissions:
  contents: write

concurrency:
  group: codex-windows-installer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: 校验打包脚本
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')) }}
    runs-on: windows-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 运行打包测试
        shell: pwsh
        run: |
          ./tests/packaging.tests.ps1

  build:
    name: 构建并验证安装器
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: windows-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 NSIS
        shell: pwsh
        run: |
          $nsisPath = "${env:ProgramFiles(x86)}\NSIS"
          $makeNsis = Get-Command makensis.exe -ErrorAction SilentlyContinue
          if ($null -eq $makeNsis) {
            for ($attempt = 1; $attempt -le 3; $attempt++) {
              Write-Host "正在安装 NSIS，第 $attempt/3 次尝试。"
              choco install nsis -y --no-progress
              $chocoExitCode = $LASTEXITCODE
              if ($chocoExitCode -eq 0) {
                break
              }
              if ($attempt -eq 3) {
                throw "Chocolatey 安装 NSIS 失败，退出码：$chocoExitCode"
              }
              $retryDelay = 15 * $attempt
              Write-Warning "Chocolatey 暂时不可用，$retryDelay 秒后重试。"
              Start-Sleep -Seconds $retryDelay
            }
          }

          if (Test-Path -LiteralPath $nsisPath) {
            $env:Path = "$nsisPath;$env:Path"
            $nsisPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
          $makeNsis = Get-Command makensis.exe -ErrorAction Stop
          & $makeNsis.Source /VERSION

      - name: 解析 MSIX 并检查是否需要打包
        shell: pwsh
        env:
          MSIX_URL: ${{ inputs.msix_url }}
          EXPECTED_VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Path source -Force | Out-Null
          $url = $env:MSIX_URL
          $resolvedVersion = $env:EXPECTED_VERSION
          $resolvedFileName = ''

          if ([string]::IsNullOrWhiteSpace($url)) {
            $packageJson = & ./scripts/resolve-msix-url.ps1 -ProductId '9PLM9XGG6VKS' -PackageFamilyName 'OpenAI.Codex_2p2nqsd0c76g0' -Ring Retail -Json
            $package = $packageJson | ConvertFrom-Json
            $url = $package.Url
            $resolvedVersion = $package.Version
            $resolvedFileName = $package.FileName
          }
          if ([string]::IsNullOrWhiteSpace($url)) {
            throw '未能解析 MSIX 下载链接。请使用 workflow_dispatch 的 msix_url 输入提供 OpenAI.Codex x64 Retail MSIX 直链。'
          }

          if ($env:GITHUB_EVENT_NAME -eq 'schedule') {
            if ([string]::IsNullOrWhiteSpace($resolvedVersion)) {
              throw '定时检查需要从 MSIX 文件名解析到 Codex 版本号，但当前结果为空。'
            }

            $tag = "v$resolvedVersion"
            $releaseApi = "https://api.github.com/repos/$env:GITHUB_REPOSITORY/releases/tags/$tag"
            $releaseResponse = Invoke-WebRequest `
              -Uri $releaseApi `
              -Headers @{
                Authorization = "Bearer $env:GH_TOKEN"
                Accept = 'application/vnd.github+json'
              } `
              -SkipHttpErrorCheck

            if ($releaseResponse.StatusCode -eq 200) {
              Write-Host "没有新版本：GitHub Release 已存在 $tag，停止本次定时打包。"
              "SHOULD_BUILD=false" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              "RESOLVED_VERSION=$resolvedVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              exit 0
            }

            if ($releaseResponse.StatusCode -ne 404) {
              throw "检查 GitHub Release $tag 失败，HTTP status: $($releaseResponse.StatusCode)"
            }

            Write-Host "发现新版本 $resolvedVersion，准备自动打包。"
          }

          Write-Host "MSIX 文件：$resolvedFileName"
          Write-Host "MSIX 版本：$resolvedVersion"
          "SHOULD_BUILD=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MSIX_URL_RESOLVED=$url" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "EXPECTED_VERSION_RESOLVED=$resolvedVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: 下载 MSIX
        if: ${{ env.SHOULD_BUILD != 'false' }}
        shell: pwsh
        run: |
          Write-Host "正在下载 MSIX：$env:MSIX_URL_RESOLVED"
          Invoke-WebRequest -Uri $env:MSIX_URL_RESOLVED -OutFile source\Codex.msix -UseBasicParsing -TimeoutSec 600
          Get-FileHash -Algorithm SHA256 -LiteralPath source\Codex.msix | Format-List

      - name: 运行打包测试
        if: ${{ env.SHOULD_BUILD != 'false' }}
        shell: pwsh
        run: |
          ./tests/packaging.tests.ps1

      - name: 构建安装器
        if: ${{ env.SHOULD_BUILD != 'false' }}
        id: build
        shell: pwsh
        run: |
          $args = @{
            MsixPath = 'source\Codex.msix'
            OutDir = 'dist'
            Unsigned = $true
          }
          if (-not [string]::IsNullOrWhiteSpace($env:EXPECTED_VERSION_RESOLVED)) {
            $args.Version = $env:EXPECTED_VERSION_RESOLVED
          }
          $result = ./scripts/build-installer.ps1 @args
          "VERSION=$($result.Version)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "INSTALLER_PATH=$($result.InstallerPath)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PORTABLE_PATH=$($result.PortablePath)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CHECKSUMS_PATH=$($result.ChecksumsPath)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_NOTES_PATH=$($result.ReleaseNotesPath)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: 在 CI 中验证安装器
        if: ${{ env.SHOULD_BUILD != 'false' }}
        shell: pwsh
        run: |
          ./scripts/test-installer-ci.ps1 -InstallerPath "$env:INSTALLER_PATH" -ExpectedVersion "$env:VERSION"

      - name: 上传 workflow artifact
        if: ${{ env.SHOULD_BUILD != 'false' }}
        uses: actions/upload-artifact@v4
        with:
          name: CodexSetup-x64-${{ env.VERSION }}
          path: |
            ${{ env.INSTALLER_PATH }}
            ${{ env.PORTABLE_PATH }}
            ${{ env.CHECKSUMS_PATH }}
            ${{ env.RELEASE_NOTES_PATH }}

      - name: 创建 GitHub Release
        if: ${{ env.SHOULD_BUILD != 'false' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          DRAFT_RELEASE: ${{ inputs.draft }}
        run: |
          if ($env:GITHUB_REF_TYPE -eq 'tag') {
            $tag = $env:GITHUB_REF_NAME
          } else {
            $tag = "v$env:VERSION"
          }

          $draft = $true
          if ($env:GITHUB_EVENT_NAME -eq 'schedule') {
            $draft = $false
          } elseif ($env:DRAFT_RELEASE -eq 'false') {
            $draft = $false
          }

          $installerAsset = "$env:INSTALLER_PATH#CodexSetup-x64-$env:VERSION.exe"
          $portableAsset = "$env:PORTABLE_PATH#CodexPortable-x64-$env:VERSION.zip"
          $releaseArgs = @(
            'release', 'create', $tag,
            $installerAsset,
            $portableAsset,
            '--title', "Codex $env:VERSION",
            '--notes-file', $env:RELEASE_NOTES_PATH,
            '--target', $env:GITHUB_SHA
          )
          if ($draft) {
            $releaseArgs += '--draft'
          }

          gh @releaseArgs
